        <!-- Script Draggable Component -->
        <script>
    /* A-Frame 1.6.0 draggable component for VR laser / raycaster pointers.
    * Add `draggable` to the entity you want to move, or add
    * `draggable="target: #windowId"` to a child grip/handle.
    */
    (function () {
    if (typeof AFRAME === 'undefined' || typeof THREE === 'undefined') return;
    var activeDrag = null;
    var pointerRay = new THREE.Ray();
    var pointerOrigin = new THREE.Vector3();
    var pointerDirection = new THREE.Vector3();
    var objectWorldPosition = new THREE.Vector3();
    var targetWorldPosition = new THREE.Vector3();
    var inverseParentWorldMatrix = new THREE.Matrix4();
    function getPointerEl(evt) {
    if (evt.detail && evt.detail.cursorEl) return evt.detail.cursorEl;
    if (evt.target && evt.target.components && evt.target.components.raycaster) return evt.target;
    return null;
    }
    function updatePointerRay(pointerEl, ray) {
    var raycaster = pointerEl && pointerEl.components && pointerEl.components.raycaster;
    if (raycaster && raycaster.raycaster && raycaster.raycaster.ray) {
    ray.copy(raycaster.raycaster.ray);
    return true;
    }
    if (!pointerEl || !pointerEl.object3D) return false;
    pointerEl.object3D.getWorldPosition(pointerOrigin);
    pointerEl.object3D.getWorldDirection(pointerDirection);
    pointerDirection.normalize();
    ray.set(pointerOrigin, pointerDirection);
    return true;
    }
    function getWorldTargetPosition(targetEl, worldPosition, outLocalPosition) {
    var parent = targetEl.object3D.parent;
    if (!parent) {
    outLocalPosition.copy(worldPosition);
    return outLocalPosition;
    }
    parent.updateMatrixWorld(true);
    inverseParentWorldMatrix.copy(parent.matrixWorld).invert();
    outLocalPosition.copy(worldPosition).applyMatrix4(inverseParentWorldMatrix);
    return outLocalPosition;
    }
    AFRAME.registerComponent('draggable', {
    schema: {
    target: { type: 'selector', default: null },
    distance: { type: 'number', default: 0 },
    faceCamera: { type: 'boolean', default: false },
    enabled: { type: 'boolean', default: true }
    },
    init: function () {
    this.dragging = false;
    this.pointerEl = null;
    this.targetEl = null;
    this.dragDistance = 0;
    this.grabOffset = new THREE.Vector3();
    this.localPosition = new THREE.Vector3();
    this.cameraWorldPosition = new THREE.Vector3();
    this.onDown = this.onDown.bind(this);
    this.onUp = this.onUp.bind(this);
    this.onSceneUp = this.onSceneUp.bind(this);
    this.el.classList.add('interactive');
    this.el.addEventListener('mousedown', this.onDown);
    this.el.addEventListener('mouseup', this.onUp);
    this.el.addEventListener('mouseleave', this.onUp);
    this.el.addEventListener('touchstart', this.onDown);
    this.el.addEventListener('touchend', this.onUp);
    this.el.addEventListener('triggerdown', this.onDown);
    this.el.addEventListener('triggerup', this.onUp);
    this.el.addEventListener('gripdown', this.onDown);
    this.el.addEventListener('gripup', this.onUp);
    if (this.el.sceneEl) {
    this.el.sceneEl.addEventListener('mouseup', this.onSceneUp);
    this.el.sceneEl.addEventListener('touchend', this.onSceneUp);
    this.el.sceneEl.addEventListener('triggerup', this.onSceneUp);
    this.el.sceneEl.addEventListener('gripup', this.onSceneUp);
    }
    },
    remove: function () {
    this.endDrag();
    this.el.removeEventListener('mousedown', this.onDown);
    this.el.removeEventListener('mouseup', this.onUp);
    this.el.removeEventListener('mouseleave', this.onUp);
    this.el.removeEventListener('touchstart', this.onDown);
    this.el.removeEventListener('touchend', this.onUp);
    this.el.removeEventListener('triggerdown', this.onDown);
    this.el.removeEventListener('triggerup', this.onUp);
    this.el.removeEventListener('gripdown', this.onDown);
    this.el.removeEventListener('gripup', this.onUp);
    if (this.el.sceneEl) {
    this.el.sceneEl.removeEventListener('mouseup', this.onSceneUp);
    this.el.sceneEl.removeEventListener('touchend', this.onSceneUp);
    this.el.sceneEl.removeEventListener('triggerup', this.onSceneUp);
    this.el.sceneEl.removeEventListener('gripup', this.onSceneUp);
    }
    },
    onDown: function (evt) {
    if (!this.data.enabled) return;
    evt.preventDefault();
    var pointerEl = getPointerEl(evt) || document.querySelector('[raycaster]') || document.querySelector('a-cursor');
    if (!pointerEl || !updatePointerRay(pointerEl, pointerRay)) return;
    if (activeDrag && activeDrag !== this) activeDrag.endDrag();
    activeDrag = this;
    this.pointerEl = pointerEl;
    this.targetEl = this.data.target || this.el;
    this.dragging = true;
    this.targetEl.object3D.getWorldPosition(objectWorldPosition);
    this.dragDistance = this.data.distance > 0 ? this.data.distance : pointerRay.origin.distanceTo(objectWorldPosition);
    targetWorldPosition.copy(pointerRay.origin).add(pointerRay.direction.clone().multiplyScalar(this.dragDistance));
    this.grabOffset.copy(objectWorldPosition).sub(targetWorldPosition);
    this.el.emit('drag-start', { target: this.targetEl, pointer: pointerEl }, false);
    },
    onUp: function () {
    this.endDrag();
    },
    onSceneUp: function () {
    this.endDrag();
    },
    tick: function () {
    if (!this.dragging || !this.pointerEl || !this.targetEl) return;
    if (!updatePointerRay(this.pointerEl, pointerRay)) return;
    targetWorldPosition.copy(pointerRay.origin)
    .add(pointerRay.direction.clone().multiplyScalar(this.dragDistance))
    .add(this.grabOffset);
    getWorldTargetPosition(this.targetEl, targetWorldPosition, this.localPosition);
    this.targetEl.object3D.position.copy(this.localPosition);
    this.targetEl.object3D.matrixWorldNeedsUpdate = true;
    if (this.data.faceCamera && this.el.sceneEl && this.el.sceneEl.camera) {
    this.el.sceneEl.camera.getWorldPosition(this.cameraWorldPosition);
    this.targetEl.object3D.lookAt(this.cameraWorldPosition);
    }
    this.el.emit('drag-move', { target: this.targetEl, pointer: this.pointerEl }, false);
    },
    endDrag: function () {
    if (!this.dragging) return;
    this.dragging = false;
    this.el.emit('drag-end', { target: this.targetEl, pointer: this.pointerEl }, false);
    this.pointerEl = null;
    this.targetEl = null;
    if (activeDrag === this) activeDrag = null;
    }
    });
    }());
    </script>
        <!-- Script Stereo Mode -->
        <script>
    (function () {
      if (typeof AFRAME === 'undefined' || typeof THREE === 'undefined') return;

      AFRAME.registerComponent('stereo-mode', {
        init: function () {
          var sceneEl = this.el;
          var renderer = sceneEl.renderer;

          if (!renderer || renderer.__stereoModeOriginalRender) return;

          var stereoCamera = new THREE.StereoCamera();
          var originalRender = renderer.render.bind(renderer);
          var renderingStereoEye = false;

          renderer.__stereoModeOriginalRender = originalRender;

          renderer.render = function (scene, camera) {
            if (renderingStereoEye || !scene || !camera) {
              return originalRender(scene, camera);
            }

            var size = renderer.getSize(new THREE.Vector2());
            var width = size.width;
            var height = size.height;
            var halfWidth = width / 2;
            var currentViewport = renderer.getViewport(new THREE.Vector4());
            var currentScissor = renderer.getScissor(new THREE.Vector4());
            var currentScissorTest = renderer.getScissorTest();
            var currentAutoClear = renderer.autoClear;

            if (camera.parent === null && sceneEl.camera && sceneEl.camera.parent) {
              sceneEl.camera.parent.updateMatrixWorld();
            }

            scene.updateMatrixWorld();
            if (camera.parent === null) camera.updateMatrixWorld();

            stereoCamera.update(camera);

            renderer.autoClear = false;
            renderer.setScissorTest(true);
            renderer.clear();

            renderingStereoEye = true;
            renderer.setScissor(0, 0, halfWidth, height);
            renderer.setViewport(0, 0, halfWidth, height);
            originalRender(scene, stereoCamera.cameraL);

            renderer.setScissor(halfWidth, 0, halfWidth, height);
            renderer.setViewport(halfWidth, 0, halfWidth, height);
            originalRender(scene, stereoCamera.cameraR);
            renderingStereoEye = false;

            renderer.setViewport(currentViewport);
            renderer.setScissor(currentScissor);
            renderer.setScissorTest(currentScissorTest);
            renderer.autoClear = currentAutoClear;
          };
        },

        remove: function () {
          var renderer = this.el.renderer;
          if (renderer && renderer.__stereoModeOriginalRender) {
            renderer.render = renderer.__stereoModeOriginalRender;
            delete renderer.__stereoModeOriginalRender;
          }
        }
      });
    }());
    </script>

    <script>
    /* ===== 1. COULEURS ===== */
    function hexToRgb(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r:r,g:g,b:b}}
    function lerpColor(c1,c2,t){return{r:Math.round(c1.r+(c2.r-c1.r)*t),g:Math.round(c1.g+(c2.g-c1.g)*t),b:Math.round(c1.b+(c2.b-c1.b)*t)}}
    function rgbStr(c){return'rgb('+c.r+','+c.g+','+c.b+')'}
    function hexToRgba(h,a){var c=hexToRgb(h);return'rgba('+c.r+','+c.g+','+c.b+','+a+')'}

    /* ===== 2. ENVIRONNEMENTS 360° ===== */
    function create360Env(palette,drawFeatures){
      var c=document.createElement('canvas');c.width=2048;c.height=1024;var ctx=c.getContext('2d');
      var sky=palette.sky||'#1a1a2e',ground=palette.ground||'#16213e';
      var grad=ctx.createLinearGradient(0,0,0,512);grad.addColorStop(0,sky);grad.addColorStop(1,ground);
      ctx.fillStyle=grad;ctx.fillRect(0,0,2048,512);
      ctx.fillStyle=ground;ctx.fillRect(0,512,2048,512);
      if(drawFeatures){
        if(drawFeatures.stars){
          for(var i=0;i<300;i++){ctx.fillStyle='rgba(255,255,255,'+(Math.random()*0.7+0.3)+')';var sx=Math.random()*2048,sy=Math.random()*400;ctx.beginPath();ctx.arc(sx,sy,Math.random()*1.5+0.5,0,Math.PI*2);ctx.fill()}
        }
        if(drawFeatures.mountains){
          ctx.fillStyle='rgba(255,255,255,0.03)';for(var m=0;m<20;m++){var mx=m*120+Math.random()*40,mh=80+Math.random()*120;ctx.beginPath();ctx.moveTo(mx,512);ctx.quadraticCurveTo(mx+40,512-mh,mx+80,512);ctx.fill()}
        }
        if(drawFeatures.groundLine){ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,508,2048,8)}
        if(drawFeatures.clouds){
          ctx.fillStyle='rgba(255,255,255,0.02)';for(var cl=0;cl<15;cl++){var cxl=Math.random()*2048,cyl=100+Math.random()*300,cwr=80+Math.random()*200;ctx.beginPath();ctx.ellipse(cxl,cyl,cwr,20,0,0,Math.PI*2);ctx.fill()}
        }
      }
      return c.toDataURL('image/png')
    }

    var environments=[
      {url:'https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg'},
      {palette:{sky:'#1a1a3e',ground:'#2a1a3e'},features:{stars:true,groundLine:true,clouds:false}},
      {palette:{sky:'#2e1a0a',ground:'#3e2a1a'},features:{stars:true,clouds:true,groundLine:true}},
      {palette:{sky:'#0a1a2e',ground:'#0a2a1e'},features:{stars:true,mountains:true,groundLine:true}},
      {palette:{sky:'#1a0a1a',ground:'#2a1a2a'},features:{stars:true,clouds:true,mountains:true}},
      {palette:{sky:'#0a0a0a',ground:'#1a1a1a'},features:{stars:true,groundLine:true}}
    ];

    var currentEnv=0;

    function cycleEnvironment(){
      currentEnv=(currentEnv+1)%environments.length;
      setEnvironment(currentEnv);
      updateDots()
    }

    function setEnvironment(idx){
      var env=environments[idx];
      var sky=document.getElementById('sky');
      if(env.url){sky.setAttribute('src',env.url)}
      else{sky.setAttribute('src',create360Env(env.palette,env.features))}
    }

    function updateDots(){
      var dots=document.querySelectorAll('.envDot');
      dots.forEach(function(d,i){d.setAttribute('color',i===currentEnv?'#5e9eff':'rgba(255,255,255,0.3)')})
    }

    function buildDots(){
      var container=document.getElementById('dotsContainer');
      for(var i=0;i<environments.length;i++){
        var dot=document.createElement('a-plane');
        dot.className='envDot';
        dot.setAttribute('width','0.04');dot.setAttribute('height','0.04');
        dot.setAttribute('position',((i-(environments.length-1)/2)*0.1)+' 0 0');
        dot.setAttribute('color','rgba(255,255,255,0.3)');
        dot.setAttribute('material','shader: flat');
        container.appendChild(dot)
      }
      updateDots()
    }

    /* ===== 3. TEXTURES DOCK ===== */
    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()
    }

    function createRoundedRectTexture(w,h,r,fill,stroke,strokeW){
      var c=document.createElement('canvas');var scale=512;c.width=scale;c.height=scale*(h/w);
      var ctx=c.getContext('2d');var cw=c.width,ch=c.height;
      roundRect(ctx,2,2,cw-4,ch-4,r*scale/w||8);
      if(fill){ctx.fillStyle=fill;ctx.fill()}
      if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=strokeW||2;ctx.stroke()}
      return c.toDataURL('image/png')
    }

    function createShadowTexture(w,h,r){
      var c=document.createElement('canvas');var s=512;c.width=s;c.height=s*(h/w);
      var ctx=c.getContext('2d');var cw=c.width,ch=c.height;
      roundRect(ctx,8,8,cw-16,ch-16,r*s/w||8);
      ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=40;ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();
      return c.toDataURL('image/png')
    }

    function createGridTexture(){
      var c=document.createElement('canvas');c.width=64;c.height=64;var ctx=c.getContext('2d');
      ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(0,0,64,64);
      ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
      for(var i=0;i<=64;i+=16){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,64);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(64,i);ctx.stroke()}
      return c.toDataURL('image/png')
    }

    /* ===== 4. ICÔNES VISIONOS ===== */
    function createVisionOSIcon(symbol,accentColor){
      var c=document.createElement('canvas');c.width=128;c.height=128;var ctx=c.getContext('2d');
      var s=128,r=28;
      roundRect(ctx,2,2,s-4,s-4,r);
      var grad=ctx.createLinearGradient(0,0,s,s);
      grad.addColorStop(0,accentColor);grad.addColorStop(0.6,accentColor);grad.addColorStop(1,'rgba(255,255,255,0.2)');
      ctx.fillStyle=grad;ctx.fill();
      ctx.shadowColor='rgba(255,255,255,0.3)';ctx.shadowBlur=4;
      roundRect(ctx,2,2,s-4,s-4,r);ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='52px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
      ctx.fillText(symbol,64,60);
      var hg=ctx.createLinearGradient(0,0,0,s*0.4);
      hg.addColorStop(0,'rgba(255,255,255,0.25)');hg.addColorStop(1,'rgba(255,255,255,0)');
      roundRect(ctx,2,2,s-4,s*0.4,r);ctx.fillStyle=hg;ctx.fill();
      ctx.globalCompositeOperation='source-atop';
      return c.toDataURL('image/png')
    }

    function getPositionInFrontOfCamera(dist,heightY){
      var cam=document.querySelector('a-camera');
      if(!cam)return{x:0,y:heightY||1.6,z:-(dist||1.5)};
      var p=new THREE.Vector3();cam.object3D.getWorldPosition(p);
      var q=new THREE.Quaternion();cam.object3D.getWorldQuaternion(q);
      var f=new THREE.Vector3(0,0,-1);f.applyQuaternion(q);f.y=0;f.normalize();
      var t=p.clone().add(f.multiplyScalar(dist||1.5));t.y=heightY||1.6;
      return{x:t.x,y:t.y,z:t.z}
    }
    var spawnInFrontOfCamera=getPositionInFrontOfCamera;

    var openWindow=function(appId){
      var id=windowIdMap[appId];var el=document.getElementById(id);
      if(!el)return;

      var pos=spawnInFrontOfCamera(2,1.6);
      console.log('[openWindow] '+appId+' target pos:',pos,'parent:',(el.parentEl?el.parentEl.tagName:'none'));

      el.removeAttribute('position');
      el.object3D.position.set(pos.x,pos.y,pos.z);
      el.object3D.matrixWorldNeedsUpdate=true;
      el.object3D.matrixAutoUpdate=true;

      for(var i=0;i<3;i++){
        (function(x,y,z){
          requestAnimationFrame(function(){
            var e=document.getElementById(id);
            if(!e)return;
            e.object3D.position.set(x,y,z);
            e.object3D.matrixWorldNeedsUpdate=true
          })
        })(pos.x,pos.y,pos.z)
      }

      el.setAttribute('visible','true');
      if(windowInit[appId]&&!windowOpened[appId]){windowInit[appId]();windowOpened[appId]=true}

      var mon=0,monId=setInterval(function(){
        var e=document.getElementById(id);
        if(!e||mon>20){clearInterval(monId);return}
        var p=e.object3D.position;
        console.log('[pos] frame '+mon+':',p.x.toFixed(2),p.y.toFixed(2),p.z.toFixed(2));
        mon++
      },500)
    };

    function setupClock(content){
      content.innerHTML='';
      var cv=document.createElement('canvas');cv.width=256;cv.height=256;
      var ctx=cv.getContext('2d');
      ctx.fillStyle='rgba(20,20,30,0.9)';ctx.beginPath();ctx.arc(128,128,120,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(128,128,120,0,Math.PI*2);ctx.stroke();
      for(var i=0;i<12;i++){var a=i*Math.PI/6;ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(126+100*Math.sin(a),126-100*Math.cos(a),4,8)}
      var div=document.createElement('a-entity');
      div.setAttribute('geometry','primitive: plane; width: 0.5; height: 0.5');
      div.setAttribute('material','shader: flat; src: '+cv.toDataURL());
      div.setAttribute('position','0 0.1 0.01');
      div.id='clockTexture';
      content.appendChild(div);
      window.__clockCanvas=cv;window.__clockCtx=ctx;window.__clockInterval=null;
      window.__clockTextureEl=div
    }

    function tickClock(){
      var cv=window.__clockCanvas,ctx=window.__clockCtx;
      if(!cv||!ctx)return;
      ctx.clearRect(0,0,256,256);
      ctx.fillStyle='rgba(20,20,30,0.9)';ctx.beginPath();ctx.arc(128,128,120,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(128,128,120,0,Math.PI*2);ctx.stroke();
      for(var i=0;i<12;i++){var a=i*Math.PI/6;ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(126+100*Math.sin(a),126-100*Math.cos(a),4,8)}
      var now=new Date();var h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
      var ha=h*Math.PI/6+m*Math.PI/360,ma=m*Math.PI/30,sa=s*Math.PI/30;
      ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(128,128);ctx.lineTo(128+60*Math.sin(ha),128-60*Math.cos(ha));ctx.stroke();
      ctx.strokeStyle='#5e9eff';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(128,128);ctx.lineTo(128+85*Math.sin(ma),128-85*Math.cos(ma));ctx.stroke();
      ctx.strokeStyle='#e74c3c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(128,128);ctx.lineTo(128+95*Math.sin(sa),128-95*Math.cos(sa));ctx.stroke();
      ctx.fillStyle='#5e9eff';ctx.beginPath();ctx.arc(128,128,4,0,Math.PI*2);ctx.fill();
      var el=window.__clockTextureEl;
      if(el&&el.components&&el.components.material){
        var mat=el.components.material.material;
        if(mat.map){mat.map.needsUpdate=true}
        else{var tex=new THREE.CanvasTexture(cv);tex.minFilter=THREE.LinearFilter;mat.map=tex;mat.needsUpdate=true}
      }
    }

    function startClock(){
      if(window.__clockInterval)clearInterval(window.__clockInterval);
      tickClock();window.__clockInterval=setInterval(tickClock,1000)
    }

    var db=null;
    function openDB(){
      return new Promise(function(resolve,reject){
        var req=indexedDB.open('VisionVR_Gallery',1);
        req.onupgradeneeded=function(e){
          var d=e.target.result;
          if(!d.objectStoreNames.contains('media'))d.createObjectStore('media',{keyPath:'id',autoIncrement:true})
        };
        req.onsuccess=function(e){db=e.target.result;resolve(db)};
        req.onerror=function(e){reject(e.target.error)}
      })
    }

    function loadAllMedia(){
      return new Promise(function(resolve,reject){
        if(!db){resolve([]);return}
        var tx=db.transaction('media','readonly');var store=tx.objectStore('media');
        var req=store.getAll();
        req.onsuccess=function(){
          var items=req.result||[];
          var oldImgs=document.querySelectorAll('a-image');
          oldImgs.forEach(function(img){
            var s=img.getAttribute('src');
            if(s&&s.startsWith('blob:')){URL.revokeObjectURL(s)}
          });
          items.forEach(function(item){
            if(item.data){item._url=URL.createObjectURL(item.data)}
          });
          resolve(items)
        };
        req.onerror=function(e){reject(e.target.error)}
      })
    }

    function saveMedia(name,file,type){
      return new Promise(function(resolve,reject){
        if(!db){reject('DB not open');return}
        var tx=db.transaction('media','readwrite');var store=tx.objectStore('media');
        var req=store.add({name:name,data:file,type:type,date:Date.now()});
        req.onsuccess=function(){resolve();refreshGallery()};
        req.onerror=function(e){reject(e.target.error)}
      })
    }

    function deleteMedia(id){
      return new Promise(function(resolve,reject){
        if(!db){reject('DB not open');return}
        var tx=db.transaction('media','readwrite');var store=tx.objectStore('media');
        var req=store.delete(id);
        req.onsuccess=function(){refreshGallery();resolve()};
        req.onerror=function(e){reject(e.target.error)}
      })
    }

          del.appendChild(dx)
        }
      })
    }

    async function refreshGallery(){
      try{var items=await loadAllMedia();buildGalleryThumbs(items)}
      catch(e){console.error('Gallery refresh error:',e)}
    }

    /* ===== 12. IMAGE VIEWER ===== */
    function showImageViewer(url){
      var viewer=document.getElementById('imageViewer');
      var plane=document.getElementById('imageViewerPlane');
      viewer.setAttribute('visible','true');viewer.setAttribute('scale','1 1 1');
      plane.setAttribute('material','src',url)
    }

    function closeImageViewer(){
      var viewer=document.getElementById('imageViewer');
      viewer.setAttribute('visible','false');viewer.setAttribute('scale','0 0 0')
    }

    /* ===== 13. CINÉMA VR ===== */
    var videoPlaying=false;
    var currentVideoUrl=null;
    function showVideoCinema(url){
      var cinema=document.getElementById('videoCinema');
      var cinemaPlane=document.getElementById('cinemaVideo');
      var videoEl=document.getElementById('videoPlayer');
      if(!videoEl||!cinemaPlane){closeVideoCinema();return}

      if(currentVideoUrl&&currentVideoUrl!==url){
        if(currentVideoUrl.startsWith('blob:'))URL.revokeObjectURL(currentVideoUrl);
        currentVideoUrl=null
      }

      if(url){
        var ytMatch=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        if(ytMatch){
          openWindow('safari');
          loadURL(url);
          return
        }
      }

      currentVideoUrl=url;

      closeWindow('gallery');
      var dock=document.getElementById('spatialMenu');
      if(dock)dock.setAttribute('visible','false');

      var mesh=cinemaPlane.getObject3D('mesh');
      if(mesh&&mesh.material){
        if(mesh.material.map){mesh.material.map=null;mesh.material.map=undefined}
        mesh.material.color.set('#000000');
        mesh.material.needsUpdate=true
      }

      videoEl.src=url;
      videoEl.load();

      document.getElementById('cinemaTapOverlay').style.display='flex';
      videoPlaying=false;

      var onReady=function(){
        videoEl.removeEventListener('loadeddata',onReady);
        videoEl.removeEventListener('canplay',onReady);

        var texture=new THREE.VideoTexture(videoEl);
        texture.minFilter=THREE.LinearFilter;
        texture.magFilter=THREE.LinearFilter;
        texture.format=THREE.RGBAFormat;
        texture.needsUpdate=true;

        if(mesh&&mesh.material){
          mesh.material.map=texture;
          mesh.material.color.set('#ffffff');
          mesh.material.transparent=false;
          mesh.material.needsUpdate=true
        }

        var pos=spawnInFrontOfCamera(2,1.6);
        cinema.setAttribute('position',pos.x+' '+pos.y+' '+pos.z);
        cinema.setAttribute('visible','true');

        var playPromise=videoEl.play();
        if(playPromise!==undefined){
          playPromise.then(function(){videoPlaying=true;document.getElementById('cinemaTapOverlay').style.display='none'}).catch(function(){})
        }
      };
      videoEl.addEventListener('loadeddata',onReady);
      videoEl.addEventListener('canplay',onReady)
    }

    function toggleVideoPlay(){
      var video=document.getElementById('videoPlayer');
      if(!video)return;
      if(videoPlaying){video.pause();videoPlaying=false}
      else{
        var p=video.play();
        if(p!==undefined)p.then(function(){videoPlaying=true}).catch(function(){})
      }
    }

    function closeVideoCinema(){
      var cinema=document.getElementById('videoCinema');
      var cinemaPlane=document.getElementById('cinemaVideo');
      var videoEl=document.getElementById('videoPlayer');
      if(videoEl){videoEl.pause();videoEl.removeAttribute('src');videoEl.load()}
      var mesh=cinemaPlane.getObject3D('mesh');
      if(mesh&&mesh.material){
        if(mesh.material.map){mesh.material.map=null;mesh.material.map=undefined}
        mesh.material.color.set('#000000');
        mesh.material.needsUpdate=true
      }
      videoPlaying=false;cinema.setAttribute('visible','false');
      document.getElementById('cinemaTapOverlay').style.display='none';
      var dock=document.getElementById('spatialMenu');
      if(dock)dock.setAttribute('visible','true');
      if(currentVideoUrl&&currentVideoUrl.startsWith('blob:')){URL.revokeObjectURL(currentVideoUrl);currentVideoUrl=null}
    }

    /* ===== 14. COMPOSANTS A-FRAME ===== */
    AFRAME.registerComponent('resize-handler',{
      init:function(){
        var self=this;
        this.el.addEventListener('click',function(){
          var s=self.el.getAttribute('scale');
          if(self.el.id&&self.el.id.indexOf('Left')!==-1||self.el.id.indexOf('Minus')!==-1){
            self.el.sceneEl.querySelector('a-camera').setAttribute('wasd-controls','enabled:false');
            showNotification('Échelle réduite')
          } else {
            showNotification('Échelle agrandie')
          }
        })
      }
    });

    AFRAME.registerComponent('resize-btn-handler',{
      init:function(){
        var self=this;
        this.el.addEventListener('click',function(){
          var diff=self.el.id.indexOf('Minus')!==-1?-0.2:0.2;
          var menu=document.getElementById('spatialMenu');
          var s=menu.getAttribute('scale').split(' ').map(Number);
          var ns=Math.max(0.3,Math.min(2,s[0]+diff));
          menu.setAttribute('scale',ns+' '+ns+' '+ns)
        })
      }
    });

    AFRAME.registerComponent('cycle-handler',{
      init:function(){this.el.addEventListener('click',function(){cycleEnvironment()})}
    });

    AFRAME.registerComponent('widget-handler',{
      init:function(){
        var self=this;
        this.el.addEventListener('click',function(){
          var id=self.el.id;var app=id.replace('widget_','');
          if(appActions[app])appActions[app].action()
        })
      }
    });

    /* ===== 15. ATTACHEMENT COMPOSANTS ===== */
    function attachComponents(){
      try{
        document.querySelectorAll('#resizeMinus3d,#resizePlus3d').forEach(function(el){
          if(!el.hasAttribute('resize-btn-handler'))el.setAttribute('resize-btn-handler','')
        });
        var cycleEl=document.getElementById('cycleBtn3d');
        if(cycleEl&&!cycleEl.hasAttribute('cycle-handler'))cycleEl.setAttribute('cycle-handler','');

        var closeMap={gallery:'galleryClose',safari:'safariClose',games:'gamesClose',weather:'weatherClose',clock:'clockClose',music:'musicClose'};
        Object.keys(closeMap).forEach(function(k){
          var el=document.getElementById(closeMap[k]);
          if(el&&el.classList.contains('interactive')){
            el.addEventListener('click',function(){closeWindow(k)})
          }
        });

        document.addEventListener('mousedown',function(){
          var raycaster=document.querySelector('a-cursor');
          if(!raycaster||!raycaster.components||!raycaster.components.raycaster)return;
          var el=raycaster.components.raycaster.intersectedEl;
          if(!el)return;
          if(el.id==='galleryImportBtn'||(el.closest&&el.closest('#galleryImportBtn'))){
            document.getElementById('filePickerOverlay').style.display='flex'
          }
          if(el.id==='musicImportBtn'||(el.closest&&el.closest('#musicImportBtn'))){
            document.getElementById('audioInput').click()
          }
          var thumb=el;
          if(thumb.id&&thumb.id.startsWith('galleryThumb_')){
            var type=thumb.getAttribute('data-type');
            if(type&&type.startsWith('video/')){
              var src=thumb.getAttribute('src');
              if(src)showVideoCinema(src)
            }
          }
          var cinema=document.getElementById('videoCinema');
          if(cinema&&cinema.getAttribute('visible')==='true'&&!videoPlaying){
            toggleVideoPlay()
          }
        });

        document.getElementById('fileInput').addEventListener('change',async function(){
          document.getElementById('filePickerOverlay').style.display='none';
          var files=Array.from(this.files);
          for(var f of files){
            try{await saveMedia(f.name,f,f.type)}catch(e){console.error('Save error:',e)}
          }
          this.value=''
        });

        document.getElementById('audioInput').addEventListener('change',function(){
          var files=this.files;if(!files.length)return;
          var file=files[0];var url=URL.createObjectURL(file);
          var audio=document.getElementById('musicAudio');
          audio.src=url;audio.load();
          document.getElementById('musicNowPlaying').setAttribute('value',file.name);
          document.getElementById('musicPlayLabel').setAttribute('value','⏸');
          audio.play();
          this.value=''
        });

        document.getElementById('galleryContent').addEventListener('click',function(e){
          var el=e.target;
          if(!el)return;
          var id=el.id||(el.parentElement&&el.parentElement.id);
          if(!id)return;
          if(id.startsWith('galleryDel_')){
            deleteMedia(parseInt(id.replace('galleryDel_','')))
          } else if(id.startsWith('galleryThumb_')){
            var src=document.getElementById(id).getAttribute('src');
            if(src){
              var type=document.getElementById(id).getAttribute('data-type');
              if(type&&type.startsWith('video/'))showVideoCinema(src)
              else showImageViewer(src)
            }
          }
        });

        var gib=document.getElementById('galleryImportBtn');
        if(gib&&gib.classList.contains('interactive')){
          gib.addEventListener('click',function(){
            document.getElementById('filePickerOverlay').style.display='flex'
          })
        }

        document.querySelector('#filePickerOverlay .picker-bg').addEventListener('click',function(){
          document.getElementById('filePickerOverlay').style.display='none'
        });

        var ivc=document.getElementById('imageViewerClose');
        if(ivc&&ivc.classList.contains('interactive'))ivc.addEventListener('click',closeImageViewer);

        var vp=document.getElementById('videoPlayBtn');
        if(vp&&vp.classList.contains('interactive'))vp.addEventListener('click',toggleVideoPlay);
        var vc=document.getElementById('videoCloseBtn');
        if(vc&&vc.classList.contains('interactive'))vc.addEventListener('click',closeVideoCinema);

        document.getElementById('cinemaTapBtn').addEventListener('click',function(){
          toggleVideoPlay();
          document.getElementById('cinemaTapOverlay').style.display='none'
        });

      }catch(e){console.error('attachComponents error:',e)}
    }

    /* ===== 16. INITIALISATION ===== */
    var scaleValue=1;
    function updateUI(){}

    function init(){
      try{
        var glassUri=createRoundedRectTexture(2.6,0.56,0.03,'rgba(30,30,40,0.75)','rgba(255,255,255,0.1)',1.5);
        var borderUri=createRoundedRectTexture(2.6,0.56,0.03,null,'rgba(255,255,255,0.2)',2);
        var shadowUri=createShadowTexture(2.6,0.56,0.03);
        document.getElementById('dockGlass').setAttribute('material','src',glassUri);
        document.getElementById('dockBorder').setAttribute('material','src',borderUri);
        document.getElementById('dockShadow').setAttribute('material','src',shadowUri);

        var gridUri=createGridTexture();
        var gridImg=document.getElementById('gridTex');
        if(gridImg)gridImg.setAttribute('src',gridUri);

        buildWidgets();
        buildAppWindows();

        windowInit.safari=function(){setupSafari(document.getElementById('safariContent'))};
        windowInit.games=function(){setupGames(document.getElementById('gamesContent'))};
        windowInit.weather=function(){setupWeather(document.getElementById('weatherContent'))};
        windowInit.clock=function(){
          setupClock(document.getElementById('clockContent'));
          setTimeout(startClock,100)
        };
        windowInit.music=function(){setupMusic(document.getElementById('musicContent'))};

        buildDots();
        setEnvironment(0);

        openDB().then(function(){refreshGallery()}).catch(function(e){console.error('DB error:',e)});
        updateUI();

        var scene=document.querySelector('a-scene');
        if(scene.hasLoaded){attachComponents()}
        else{scene.addEventListener('loaded',attachComponents)}

      }catch(e){console.error('init error:',e)}
    }

    if(document.readyState==='complete'){init()}
    else{document.addEventListener('DOMContentLoaded',init)}

    window.addEventListener('beforeunload',function(){
      var imgs=document.querySelectorAll('a-image');
      imgs.forEach(function(img){
        var src=img.getAttribute('src');
        if(src&&src.startsWith('blob:'))URL.revokeObjectURL(src)
      });
      if(currentVideoUrl&&currentVideoUrl.startsWith('blob:')){URL.revokeObjectURL(currentVideoUrl);currentVideoUrl=null}
      var audio=document.getElementById('musicAudio');
      if(audio&&audio.src&&audio.src.startsWith('blob:')){URL.revokeObjectURL(audio.src)}
    });
    </script>
